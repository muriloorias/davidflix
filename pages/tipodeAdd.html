<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O Que Você Curte Assistir?</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/tipoDeeAdd.css">
</head>

<body>

<div class="container">

  <div class="header">
    <div class="eyebrow">antes de começarmos</div>
    <h1>O Que Você Gosta de Assistir?</h1>
    <p class="subtitle">Escolha uma opção abaixo.</p>
  </div>

  <form id="form" onsubmit="handleSubmit(event)">
    
    <div class="options">

      <div class="option">
        <input type="radio" name="escolha" id="starwars" value="Star Wars" required>
        <label for="starwars">
          <div class="option-title">Star Wars</div>
          <div class="option-sub">Jedi, Sith e a galáxia</div>
        </label>
      </div>

      <div class="option">
        <input type="radio" name="escolha" id="velozes" value="Velozes e Furiosos">
        <label for="velozes">
          <div class="option-title">Velozes e Furiosos</div>
          <div class="option-sub">Carros, velocidade e ação</div>
        </label>
      </div>

      <div class="option">
        <input type="radio" name="escolha" id="mj" value="Michael Jackson">
        <label for="mj">
          <div class="option-title">Michael Jackson</div>
          <div class="option-sub">O rei do pop</div>
        </label>
      </div>

    </div>

    <button type="button" onclick="continuarEscolha()">CONTINUAR</button>
  </form>
</div>
<script src="../js/add.js"></script>

</body>
</html>
